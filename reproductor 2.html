<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reproductor Pro</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      padding-top: env(safe-area-inset-top);
      background-color: #01011d !important;
      background: black;
      height: 100%;
      overflow: hidden;
      font-family: 'Roboto', sans-serif;
      color: white;
    }

    .player {
      position: relative;
      width: 100%;
      height: 100vh;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: black;
    }

    .overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.4);
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }

    .overlay.visible {
      opacity: 1;
    }

    .controls {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      opacity: 1;
      transition: opacity 0.5s;
      pointer-events: none;
    }

    .controls.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .top-bar, .bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      pointer-events: auto;
    }

    .top-bar {
      position: absolute;
      top: 0; width: 100%;
    }

    .bottom-bar {
      position: absolute;
      bottom: 0; width: 100%;
      flex-direction: column;
      align-items: flex-start;
    }

    .title {
      font-weight: bold;
      font-size: 1.3em;
      margin-bottom: 3px;
    }

    .subtitle {
      font-size: 0.95em;
      color: #ccc;
    }

    .center-controls {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 40px;
      pointer-events: auto;
    }

    .btn {
      background: none;
      border: none;
      color: white;
      font-size: 2.5em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn .material-icons {
      font-size: 55px;
    }

    .progress-container {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }

    .progress {
      flex: 1;
      appearance: none;
      height: 5px;
      background: #aaa;
      border-radius: 3px;
      cursor: pointer;
    }

    .progress::-webkit-slider-thumb {
      appearance: none;
      height: 15px;
      width: 15px;
      border-radius: 50%;
      background: white;
      border: none;
    }

    .time {
      font-size: 0.9em;
      color: #ccc;
      white-space: nowrap;
    }

    .icon-btn {
      font-size: 28px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div style="position:absolute; top: 10px; left: 10px; z-index:9999;">
    <label style="background: #333; padding: 10px; border-radius: 6px; cursor: pointer;">
      📁 Buscar película
      <input type="file" accept="video/*" style="display:none;" onchange="cargarDesdeDispositivo(this)">
    </label>
  </div>
  

<video id="video" poster="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABAQMAAAAl21bKAAAAA1BMVEX///+nxBvIAAAAAXRSTlMAQObYZgAAAApJREFUGFdjYAAAAAIAAeIhvDMAAAAASUVORK5CYII=" preload="metadata"></video>


 <div class="overlay-top" id="overlayTop"></div>
<div class="overlay-bottom" id="overlayBottom"></div>

    
    <div class="overlay" id="overlay"></div>

  <div class="controls" id="controls">
    <div class="top-bar">
      <div class="icon-btn material-icons" onclick="goBack()">arrow_back</div>
      <div style="display: flex; gap: 15px;">
        <div class="icon-btn material-icons">cast</div>
        <div class="icon-btn material-icons">chat_bubble_outline</div>
      </div>
    </div>

    <div class="center-controls">
      <button class="btn" onclick="skip(-10)">
        <span class="material-icons">replay_10</span>
      </button>
      <button class="btn" id="playPauseBtn" onclick="togglePlay()">
        <span class="material-icons">play_arrow</span>
      </button>
      <button class="btn" onclick="skip(10)">
        <span class="material-icons">forward_10</span>
      </button>
    </div>

    <div class="bottom-bar">
      <div>
        <div class="title">The Big Bang Theory</div>
        <div class="subtitle">T6 E21: The Closure Alternative</div>
      </div>
      <div class="progress-container">
        <div class="buffer-bar" id="bufferBar"></div>
        <input type="range" class="progress" id="progress" value="0" max="100">
        <div class="time" id="duration">- 00:00</div>
      </div>
    </div>
  </div>
</div>

<script>
  const video = document.getElementById('video');
  const controls = document.getElementById('controls');
  const overlay = document.getElementById('overlay');
  const player = document.getElementById('player');
  const progress = document.getElementById('progress');
  const duration = document.getElementById('duration');
  const playPauseBtn = document.getElementById('playPauseBtn').querySelector('.material-icons');

  let hideControlsTimeout;

  function togglePlay() {
    if (video.paused) {
      video.play();
      playPauseBtn.textContent = 'pause';
      overlay.classList.remove('visible');
    } else {
      video.pause();
      playPauseBtn.textContent = 'play_arrow';
      overlay.classList.add('visible');
    }
  }

  function skip(seconds) {
    video.currentTime += seconds;
  }

  function goBack() {
    alert("Volver (funcionalidad pendiente)");
  }

  function updateProgress() {
    const percent = (video.currentTime / video.duration) * 100;
    progress.value = percent;
    const mins = Math.floor(video.duration / 60);
    const secs = Math.floor(video.duration % 60).toString().padStart(2, '0');
    duration.textContent = `- ${mins}:${secs}`;
  }

  video.addEventListener('timeupdate', updateProgress);

  progress.addEventListener('input', () => {
    video.currentTime = (progress.value / 100) * video.duration;
  });

  function showControls() {
    controls.classList.remove('hidden');
    clearTimeout(hideControlsTimeout);
    hideControlsTimeout = setTimeout(() => {
      controls.classList.add('hidden');
    }, 3000);
  }

  player.addEventListener('mousemove', showControls);
  player.addEventListener('click', showControls);
  player.addEventListener('touchstart', showControls);

  // Mostrar controles al cargar
  showControls();

  // También controlar el overlay según play/pause de eventos externos
  video.addEventListener('pause', () => overlay.classList.add('visible'));
  video.addEventListener('play', () => overlay.classList.remove('visible'));

  document.addEventListener("DOMContentLoaded", () => {
  const video = document.getElementById('video');
  const videoSrc = localStorage.getItem("rutaParaReproducir");

  if (videoSrc) {
    video.src = videoSrc.startsWith("file://") ? videoSrc : "file://" + videoSrc;
    video.load();
    video.play();
  } else {
    alert("No se encontró el archivo local para reproducir.");
  }
});


function cargarDesdeDispositivo(input) {
  const archivo = input.files[0];
  if (archivo) {
    const urlLocal = URL.createObjectURL(archivo);
    const video = document.getElementById("video");
    video.src = urlLocal;
    video.play();
  }
}

</script>

</body>
</html>
