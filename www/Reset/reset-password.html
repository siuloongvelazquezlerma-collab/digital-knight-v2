<head>

  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  
  <title>Restablecer contraseña – Digital Knight</title>
  <link rel="icon" type="image/png" href="logo-2025.png" />
  <style>
    * { box-sizing: border-box; }

    body {
      padding-top: env(safe-area-inset-top);
      background: linear-gradient(135deg, #000013, #0a0a2a);
      color: white;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
      position: relative;
      padding: 20px;
    }

    .top-image {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100vh;
      background-position: top center;
      background-size: cover;
      z-index: 0;
    }

    .overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100vh;
      background: linear-gradient(to top, #0a0a2a, #0a0a2a, #0a0a2acc, transparent);
      z-index: 1;
    }

    .logo-center {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
    }

    .logo-center img {
      height: 22px;
    }

    .reset-box {
      background: #111111;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 60px #00f7ff41;
      width: 100%;
      max-width: 320px;
      z-index: 3;
      text-align: center;
    }

    .reset-box h2 {
      margin-bottom: 20px;
      font-size: 20px;
    }

    .reset-box input {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border: none;
      border-radius: 8px;
      background: #222;
      color: white;
      font-size: 14px;
    }

    .reset-box button {
      width: 100%;
      padding: 10px;
      background: #00f7ff;
      border: none;
      border-radius: 8px;
      color: #000;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .reset-box button:hover {
      background: #00dbe3;
    }

    .msg {
      margin-top: 10px;
      font-size: 14px;
    }

    .password-wrapper {
      position: relative;
    }

    .password-wrapper span {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 18px;
    }

    @media (max-width: 768px) {
      .reset-box {
        margin-top: 200px;
      }
    }

     /* Deshabilitar selección de texto e interacciones */
  body, img, a, button, select, textarea {
              -webkit-user-select: none; /* Safari */
              -moz-user-select: none; /* Firefox */
              -ms-user-select: none; /* IE10+/Edge */
              user-select: none; /* estándar */
          }
  
          /* Deshabilitar resaltado en elementos interactivos */
          a, button, select, textarea {
              -webkit-tap-highlight-color: transparent; /* Safari */
          
          }
  
          /* Deshabilitar el arrastre de imágenes */
          img {
              pointer-events: none; /* Desactiva interacciones del puntero en imágenes */
          }
  </style>
</head>
<body oncontextmenu="return false" ondragstart="return false" onselectstart="return false">
  <div class="top-image" id="topImage"></div>
  <div class="overlay"></div>

  <div class="logo-center">
    <img src="https://od.lk/s/M18zMTIxODI5MjVf/Knight.png" alt="Logo Digital Knight" />
  </div>

  <div class="reset-box">
    <h2>Restablece tu contraseña</h2>
  
    <div style="position: relative;">
      <input type="password" id="newPassword" placeholder="Nueva contraseña" style="padding-right: 40px;" />
      <span id="togglePassword" class="material-icons" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer;">
        visibility
      </span>
    </div>
  
    <button id="resetBtn">Actualizar contraseña</button>
    <p class="msg" id="msg"></p>
  </div>
  

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
  
    const supabase = createClient(
      'https://eacgmqikpwzqdmgixtja.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVhY2dtcWlrcHd6cWRtZ2l4dGphIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU1MjIwNzYsImV4cCI6MjA4MTA5ODA3Nn0.OUE0PYKVOUtIKQeMebxdy7ALWwHnjiVQPMEOlruPsXg'
    );
  
    const resetBtn = document.getElementById("resetBtn");
    const newPasswordInput = document.getElementById("newPassword");
    const msg = document.getElementById("msg");
  
    resetBtn.addEventListener("click", async () => {
      const newPassword = newPasswordInput.value.trim();
      if (!newPassword) return msg.textContent = "⚠️ Escribe una nueva contraseña.";
  
      const { error } = await supabase.auth.updateUser({ password: newPassword });
  
      if (error) {
        msg.style.color = "#ff6666";
        msg.textContent = "❌ Error: " + error.message;
      } else {
        msg.style.color = "#00f7ff";
        msg.textContent = "✅ Contraseña actualizada. Puedes cerrar esta página.";
      }
    });
  
    // 👁️ Toggle para mostrar/ocultar la contraseña con ícono moderno
    const togglePassword = document.getElementById("togglePassword");
    const passwordInput = document.getElementById("newPassword");
  
    togglePassword.addEventListener("click", () => {
      const isPassword = passwordInput.type === "password";
      passwordInput.type = isPassword ? "text" : "password";
      togglePassword.textContent = isPassword ? "visibility_off" : "visibility";
    });
  
    // 🖼️ Imagen decorativa dinámica según orientación
    const topImage = document.getElementById("topImage");
    function setImage() {
      const isPortrait = window.matchMedia("(orientation: portrait)").matches;
      topImage.style.backgroundImage = isPortrait
        ? "url('https://od.lk/s/M18zMTgzNTk0Njdf/hbo-max-2025-quilt_mob-chespirito-mex.jpg')"
        : "url('https://od.lk/s/M18zMTgzNTk0NjZf/hbo-max-2025-quilt_dsk-chespirito-mex.jpg')";
    }
    setImage();
    window.addEventListener("resize", setImage);
  </script>
  
</body>
</html>
