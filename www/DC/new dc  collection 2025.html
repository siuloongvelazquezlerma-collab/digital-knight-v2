.fondo-principal {
  position: relative;
  width: 100%;
  height: 100vh;
  background: url('https://od.lk/s/M18zMTgxODM5MDZf/dc%20poster.jpg') top center / contain no-repeat;
  z-index: 0;

  filter: brightness(1.4); /* 👈 Aumenta el brillo (1 es normal, 1.2 es +20%) */
}



@media (orientation: landscape) {
  .fondo-principal {
    background: url('https://od.lk/s/M18zMTgxODM5MDFf/dc%20fondo.jpg') top center / cover no-repeat;
    filter: brightness(1.6); /* También para landscape si quieres */
  }
  .fondo-principal::before {
    background: linear-gradient(to top, rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.822)),
                linear-gradient(to bottom, rgba(0,0,0,0), rgba(0,0,0,0.9)),
                linear-gradient(to right, rgba(0, 0, 0, 0.13), rgba(0,0,0,0));
  }
}

.logo-dc {
  display: block;
  position: relative;     /* O asegurarte que no sea static */
  z-index: 1;             /* z-index mayor al fondo */
  width: 150px;
  max-width: 25vw;
  margin: 0 auto;
  margin-top: -400px;
  transition: opacity 0.3s ease; /* 👈 solo opacity */
}

@media (orientation: landscape) {
  .logo-dc {
    margin-top: -550px;          /* Ajusta según necesites en landscape */
    margin-left: 2%;
    transform: translateY(0);
    width: 240px;
    max-width: 12vw;
  }
}

.contenido-principal {
  position: relative;
  z-index: 2;
  margin-top: 1px;       /* Ajuste si quieres separarlo más del logo */
  padding: 1rem;
}

@media (orientation: landscape) {
  .contenido-principal {
    margin-top: 5vh;
  }
}

.heroes-zone.hbo-style {
  position: relative;
  padding: 28px 20px;
  border-radius: 12px;
  overflow: hidden;
  color: #fff;
  background-image: url('https://od.lk/s/M18zMTk5Mjg4Mjlf/dc%20kids%20fondo.jpg');
  background-size: cover;
  background-position: center;
  box-shadow: 0 8px 30px rgba(0,0,0,0.55);
}

.heroes-zone.hbo-style::before{
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(6,12,34,0.7), rgba(6,12,34,0.9));
  z-index: 0;
}

.heroes-inner{
  position: relative;
  z-index: 1;
}

.scroll-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  position: relative; /* Necesario para que el badge se posicione sobre los posters */
}

.badge-theme {
  text-align: center;
  margin-bottom: 16px; /* espacio entre logo/subtítulo y posters */
  color: #fff;
}

.badge-theme .badge-logo {
  display: block;
  width: 140px; /* Ajusta según el logo */
  height: auto;
  margin: 0 auto;
}

.badge-theme .badge-subtitle {
  margin-top: 6px;
  font-weight: 700;
  font-size: 18px;
  letter-spacing: .5px;
  color: #fff;
}





.scroll-row {
  display:flex;
  gap:14px;
  overflow-x:auto;
  scroll-behavior: smooth;
  padding:18px 4px;
}
.scroll-row::-webkit-scrollbar{ height:8px; }
.scroll-row::-webkit-scrollbar-thumb{ background: rgba(255, 255, 255, 0); border-radius:8px; }

/* Posters más grandes estilo HBO */
.poster-horizontal.big{
  width: 160px;
  height: 240px;
  background-size:cover;
  background-position:center;
  border-radius:10px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.6);
  flex: 0 0 auto;
  transition: transform .2s ease, box-shadow .2s ease;
  margin-top: 30px;
}




@media (max-width:640px){
  .poster-horizontal.big{ width:120px; height:180px; }
  
}

  <script>
     window.addEventListener('load', function () {
  const overlay = document.querySelector('.overlay-loader-page');
  const loader = document.getElementById('loader');

  // Se mantiene el loader visible por 1 segundo
  setTimeout(() => {
    loader.style.opacity = '0'; // Corrige esto: '2' no tiene efecto visual
    setTimeout(() => {
      loader.style.display = 'none';
      overlay.classList.add('hidden');
    }, 300);
  }, 1000);
});

const logo = document.querySelector('.logo-dc');
  const fondo = document.querySelector('.fondo-principal');

  window.addEventListener('scroll', () => {
    const scroll = window.scrollY;
    const fadeLimit = 300; // píxeles para desaparecer

    let opacity = 1 - scroll / fadeLimit;
    opacity = Math.max(0, Math.min(1, opacity));

    logo.style.opacity = opacity;
    fondo.style.opacity = opacity;
  });

   // Scroll vertical (sin cambios)
document.querySelectorAll('.scroll-container').forEach(container => {
  const scroll = container.querySelector('.scroll-poster');
  container.querySelector('.arrow.left').onclick = () => scroll.scrollBy({ left: -600, behavior: 'smooth' });
  container.querySelector('.arrow.right').onclick = () => scroll.scrollBy({ left: 600, behavior: 'smooth' });
});

// Scroll horizontal universal
document.querySelectorAll('.scroll-container-horizontal, .scroll-wrap').forEach(container => {
  // Seleccionamos la fila correcta según el contenedor
  const scroll = container.querySelector('.scroll-poster-horizontal, .scroll-row');
  const left = container.querySelector('.arrow.left');
  const right = container.querySelector('.arrow.right');

  if (scroll && left && right) {
    left.onclick = () => scroll.scrollBy({ left: -600, behavior: 'smooth' });
    right.onclick = () => scroll.scrollBy({ left: 600, behavior: 'smooth' });
  }
});

// Efecto del header
document.addEventListener("DOMContentLoaded", function () {
  const header = document.getElementById('header');
  const pageLogo = document.getElementById('page-logo');

  if (!header || !pageLogo) return;

  window.addEventListener('scroll', () => {
    const scrollY = window.scrollY;
    const maxScroll = 300;

    const opacity = Math.min(scrollY / maxScroll, 1);
    const logoOpacity = scrollY > 150 ? opacity : 0;

    header.style.backgroundColor = `rgba(1, 1, 29, ${opacity})`;
    pageLogo.style.opacity = logoOpacity;
  });
});



// Gestión de imágenes de perfil
const footerProfileIcon = document.getElementById("footerIconImg");
const headerProfileIcon = document.getElementById("headerProfileIcon"); // NUEVO
const profileImage = document.getElementById("profileImage");
const profilePageImage = document.getElementById("profilePageImage");

const defaultProfileIcon = document.getElementById("defaultProfileIcon");
const defaultProfileIconAlt = document.getElementById("defaultProfileIconAlt");

// Función para cambiar todas las imágenes de perfil
function updateProfileImage(src) {
  if (profileImage) profileImage.src = src;
  if (profilePageImage) profilePageImage.src = src;
  if (footerProfileIcon) footerProfileIcon.src = src;
  if (headerProfileIcon) headerProfileIcon.src = src;

  if (defaultProfileIcon) defaultProfileIcon.style.display = 'none';
  if (defaultProfileIconAlt) defaultProfileIconAlt.style.display = 'none';

  localStorage.setItem('profileImage', src);
}

// Restaurar la imagen de perfil guardada al cargar la página
window.addEventListener('load', function () {
  const storedProfileImage = localStorage.getItem('profileImage');
  if (storedProfileImage) {
    if (footerProfileIcon) footerProfileIcon.src = storedProfileImage;
    if (headerProfileIcon) headerProfileIcon.src = storedProfileImage;
    if (profileImage) profileImage.src = storedProfileImage;
    if (profilePageImage) profilePageImage.src = storedProfileImage;

    if (defaultProfileIcon) defaultProfileIcon.style.display = 'none';
    if (defaultProfileIconAlt) defaultProfileIconAlt.style.display = 'none';
  }
});
  
  // Ocultar footer al hacer scroll hacia abajo
  var lastScrollTop = 0;
  var footer = document.querySelector(".footer");
  
  window.addEventListener("scroll", function () {
      var currentScroll = window.scrollY;
  
      if (currentScroll > lastScrollTop) {
          footer.classList.add("hidden");
      } else {
          footer.classList.remove("hidden");
      }
  
      lastScrollTop = currentScroll;
  });

  </script>
