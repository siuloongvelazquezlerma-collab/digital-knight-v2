    .modal-header {
    position: sticky;
    top: 0px;
    background: #000000;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 20px;
    border-bottom: 1px solid #ddd;
    margin-top: -60px; /* Compensa el espacio inicial */
}

.editable-background-gradient {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(to bottom, #00000000, #0000001a, #00000023, #0000005d, #0000009a);
        z-index: 1;
    }

.modal-header .back-icon {
    font-size: 24px;
    cursor: pointer;
    color: #fff;
}

.image-category {
    overflow-x: auto; /* Habilita desplazamiento horizontal */
    padding-left: 10px; /* Espacio a la izquierda */
    box-sizing: border-box; /* Asegura que el padding no afecte el tamaño del contenedor */
    margin-bottom: 5px;
    margin-top: 10px;
}

.category-title {
    text-align: left;
    font-size: 1.1em;
    font-weight: bold;
    padding-left: 20px;
    margin-bottom: 3px;
    position: sticky; /* Mantiene el título fijo */
    top: 0;
    background-color: rgb(0, 0, 0); /* Fondo oscuro para visibilidad */
    z-index: 2;
    margin-top: 15px;
}

.image-option {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    object-fit: cover;
    cursor: pointer;
    border: 2px solid white;
    z-index: 1;
    margin-top: 5px;
}

.modal-header-title {
    font-size: 1.2em;
    font-weight: bold;
}

.ready-button {
    background-color: #f4433600;
    color: #fff;
    padding: 10px 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    text-decoration: none; /* Quita la línea blanca de abajo */
}

.editable-profile-container {
    position: absolute; /* Posiciona la imagen de perfil sobre la imagen de fondo */
    top: 26%; /* Centra la imagen de perfil verticalmente */
    left: 50%; /* Centra la imagen de perfil horizontalmente */
    transform: translate(-50%, -50%); /* Aplica un desplazamiento para centrar la imagen */
    border-radius: 50%; /* Hace la imagen de perfil circular */
    overflow: hidden;
    z-index: 2; /* Asegura que la imagen de perfil esté por encima de la imagen de fondo */
}

.editable-profile {
    width: 100px; /* Ajusta el tamaño de la imagen de perfil */
    height: 100px;
    object-fit: cover;
    border-radius: 50%;
    border: 3px solid white; /* Añade un borde blanco alrededor de la imagen de perfil */
}


.editable-background-container-modal {
    position: relative;
    width: 100%;
    height: 300px; /* Ajusta según lo que necesites */
    overflow: hidden; /* Evita que la imagen se salga del contenedor */
}



.image-options-scroll {
    overflow-x: auto;
    white-space: nowrap;
}

.image-option-background {
    width: 200px; /* Ajuste de ancho */
    height: 120px; /* Ajuste de altura */
    object-fit: cover; /* Asegura recorte */
    border-radius: 5px; /* Bordes redondeados */
    cursor: pointer;
    transition: transform 0.3s ease;
}

.image-option-background:hover {
    cursor: pointer; /* Cursor cambiante al pasar sobre imagen */
}

.image-options {
    display: inline-flex;
    gap: 10px;
    overflow-x: auto; /* Solo desplazamiento horizontal en imágenes */
    padding-left: 20px;
}

#backgroundImageOption {
    width: 100%;
    height: 200px; /* Ajusta según sea necesario */
    background-size: cover;
    background-position: center;
}
.selected-image-profile {
    filter: brightness(0.8);
    border: 3px solid #FF5722;
    border-radius: 50%;
}

.selected-image-background {
    filter: brightness(0.8);
    border: 2px solid #FF5722;
}

.editable-background {
    width: 100%;
    height: 100%;
    object-fit: contain; /* Mantiene las proporciones de la imagen */
    background-color: #000; /* Color de fondo en caso de que haya espacios vacíos */
}

    <script>
    function selectBackgroundImage(imageUrl, selectedImage) {
    // Cambiar la imagen en el contenedor predeterminado
    const backgroundImageElement = document.getElementById('editableBackgroundInModal');
    
    if (backgroundImageElement) {
        // Cambiar la fuente de la imagen a la nueva seleccionada
        backgroundImageElement.src = imageUrl;

        // Mostrar en consola para depuración
        console.log("Imagen de fondo cambiada a:", imageUrl);
    } else {
        console.error("No se pudo encontrar la imagen de fondo para actualizar.");
    }

    // Remover la clase de selección de todas las imágenes
    document.querySelectorAll('.image-option-background').forEach(img => {
        img.classList.remove('selected-image-background');
    });

    // Agregar la clase de selección a la imagen seleccionada
    selectedImage.classList.add('selected-image-background');
}
