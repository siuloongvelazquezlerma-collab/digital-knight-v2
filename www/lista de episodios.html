        // Inicializar Video.js
        var player = videojs('my-video');

        function mostrarEpisodios() {
            var seasonList = document.getElementById('season-list');
            playlist.seasons.forEach(function(season) {
                var seasonElement = document.createElement('div');
                seasonElement.classList.add('season');
                
                var seasonTitle = document.createElement('h2');
                seasonTitle.classList.add('season-title');
                seasonTitle.textContent = season.season_title;
                seasonElement.appendChild(seasonTitle);
                
                var episodeList = document.createElement('div');
                episodeList.classList.add('episode-list');
                
                season.episodes.forEach(function(episode) {
                    var episodeItem = document.createElement('div');
                    episodeItem.classList.add('episode-item');
                    
                    var episodeImage = document.createElement('img');
                    episodeImage.src = episode.image;
                    episodeItem.appendChild(episodeImage);
                    
                    var episodeTitle = document.createElement('h3');
                    episodeTitle.textContent = episode.title;
                    episodeItem.appendChild(episodeTitle);
                    
                    var episodeLink = document.createElement('a');
                    episodeLink.href = '#'; // Previene abrir el enlace directamente
                    episodeLink.textContent = "Ver episodio";
                    
                    // Al hacer clic en el enlace, actualizar el reproductor Video.js
                    episodeLink.addEventListener('click', function(e) {
                        e.preventDefault();
                        player.src({ type: 'video/mp4', src: episode.video_url });
                        player.play();
                    });
                    
                    episodeItem.appendChild(episodeLink);
                    episodeList.appendChild(episodeItem);
                });
                
                seasonElement.appendChild(episodeList);
                seasonList.appendChild(seasonElement);
            });
        }

        mostrarEpisodios();
