<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Redirigiendo a Digital Knight</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

  <style>
    body {
      padding-top: env(safe-area-inset-top); font-family: sans-serif; text-align: center; padding-top: 2rem; }
  *:focus {
  outline: 3px solid #00f7ff;
  outline-offset: 2px;
  border-radius: 8px;
}

/* Ocultar focus en móviles (pantallas pequeñas) */
@media (max-width: 768px) {
  *:focus {
    outline: none !important;
    box-shadow: none !important;
  }
}

/* Mostrar focus en pantallas grandes (TV, PC) */
@media (min-width: 769px) {
  *:focus {
    outline: 3px solid #00f7ff;
    outline-offset: 2px;
    border-radius: 8px;
  }
}


.tabs-secondary {
  display: none;
  justify-content: center;
  gap: 10px;
  padding: 10px 0;
  background-color: #11111111;
  border-bottom: 1px solid #44444400;
  z-index: 3010;
}

.tabs-secondary .tab {
  color: white;
  text-decoration: none;
  font-weight: bold;
  padding: 6px 12px;
  transition: background 0.3s ease;
  z-index: 3010;
}

.tabs-secondary .tab:hover {
  background-color: #81818179;
  border-radius: 8px;
}

@media screen and (min-width: 1024px) {
  .tabs-secondary {
    display: flex;
  }
}

@media screen and (min-width: 1200px) {
  /* Tabs grandes en pantallas grandes */
  .tabs-secondary {
    gap: 10px;
    padding: 16px 40px;
  }

  .tabs-secondary .tab {
    font-size: 22px;
    padding: 12px 10px 8px;
  }

  .tabs-secondary .tab.active::after {
    content: "";
    display: block;
    height: 4px;
    background-color: white;
    margin-top: 4px;
    border-radius: 2px;
  }
}


    </style>
</head>
<body>
  <p>Redirigiendo a la app…</p>
  <script>
    const params = new URLSearchParams(window.location.search);
    const path = params.get("path") || "/";
    
    // Enlace para abrir la app con URI scheme personalizado (ajusta si cambias el esquema)
    const appLink = `digitalknight://open${path}`;
    // Enlace de instalación de AppCreator24
    const fallback = "http://www.appcreator24.com/app3517056-dgsla4";

    // Intenta abrir la app
    window.location.href = appLink;

    // Redirige a la instalación si no abre en 1.5 seg
    setTimeout(() => {
      window.location.href = fallback;
    }, 1500);
  </script>
</body>
</html>
