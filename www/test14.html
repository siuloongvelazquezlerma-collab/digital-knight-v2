        /* Overlay para la imagen vertical */
.portrait-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh; /* Ocupa toda la altura de la pantalla */
    background: linear-gradient(to bottom, #000000ce, #00000000, #00000000, #000000da, #000000, #000000),
                url('https://image.tmdb.org/t/p/original/5XJabHGBaH2qAZAE2kVKCmrnY70.jpg') no-repeat top center;
    background-size: contain;
    z-index: 250; /* Asegura que esté sobre el video */
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 24px;
    text-align: center;
    opacity: 1; /* Visible inicialmente */
    transition: opacity 0.5s ease-in-out; /* Transición suave */
}

/* Overlay para la imagen horizontal */
.horizontal-overlay {
    display: none;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    background-size: contain;
    z-index: 150;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 24px;
    text-align: center;
    opacity: 0;
    transition: opacity 0.5s ease-in-out;
    pointer-events: none;
}

/* Fondo desenfocado + primer gradiente */
.horizontal-overlay::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: 
        linear-gradient(to bottom, #000000c4, #00000071, #00000071, #000000c4, #000000d7, #000000),
        url('https://image.tmdb.org/t/p/original/6Lw54zxm6BAEKJeGlabyzzR5Juu.jpg') no-repeat center center;
    background-size: cover;
    filter: blur(5px); /* Desenfoque para la imagen */
    z-index: 1; /* El fondo desenfocado estará debajo de la imagen */
}

/* Gradiente encima de la imagen desenfocada */
.horizontal-overlay::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(to bottom, #000000ce, #00000000, #00000000, #000000da, #000000, #000000);
    z-index: 2; /* Gradiente encima de la imagen desenfocada */
}

/* Imagen principal superpuesta */
.horizontal-overlay img {
    top: 0;
    position: absolute; /* Asegura la superposición sobre el fondo */
    width: 100%;
    height: 100vh; /* Ocupa toda la altura de la pantalla */
    object-fit: contain; /* Mantiene las proporciones */
    z-index: 1; /* Imagen detrás del gradiente */
    padding: 10px; /* Opcional: un poco de separación visual */
    border-radius: 10px; /* Opcional: bordes redondeados */
}

/* Gradiente encima de la imagen nítida */
.horizontal-overlay img::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh; /* Ocupa toda la altura de la pantalla */
    background: linear-gradient(to bottom, #000000ce, #00000000, #00000000, #000000da, #000000, #000000);
    z-index: 3; /* Gradiente encima de la imagen nítida */
    pointer-events: none; /* Permite que la imagen sea clickeable sin interferencia del gradiente */
}

/* Mostrar y ocultar las capas según la orientación */
@media (orientation: landscape) {
    .portrait-overlay {
        display: none; /* Oculta el overlay vertical en landscape */
    }

    .horizontal-overlay {
        display: flex; /* Muestra el overlay horizontal */
        opacity: 1; /* Hace visible la imagen horizontal */
        pointer-events: auto; /* Permite interacciones en modo landscape */
    }
}

@media (orientation: portrait) {
    .portrait-overlay {
        display: flex; /* Asegura que el overlay vertical esté visible */
        opacity: 1; /* Visible */
    }

    .horizontal-overlay {
        display: none; /* Oculta completamente la imagen horizontal en portrait */
    }
}


    

        
        /* TABS */
        .tabs { display: flex;
    justify-content: flex-start;
    align-items: center;
    background-color: transparent;
    padding: 10px 15px;
    margin-top: 140%;
    gap: 60px;
    border-bottom: 1px solid #525252;
    z-index: 300; /* Mayor que el horizontal-overlay pero menor que el overlay-dropdown */
    position: relative; /* Asegura que el z-index se aplique correctamente */
}
 .tab {
    background: none;
    border: none;
    padding: 2px 0; /* Reducimos el padding para acercarlo a la línea */
    cursor: pointer;
    font-size: 18px;
    color: rgb(129, 129, 129);
    font-weight: normal; /* Inactivo SIN negrita */
    position: relative; /* Necesario para el ::after */
}

.tab.active {
    color: rgb(247, 247, 247);
    font-weight: bold; /* Activo CON negrita */
}

.tab.active::after {
    content: ""; /* Elemento visual */
    position: absolute;
    left: 0;
    bottom: -13px; /* Ajuste más preciso para la línea activa */
    width: 100%;
    height: 3px; /* Grosor de la línea */
    background-color: rgb(255, 255, 255); /* Color de la línea activa */
    z-index: 10; /* Asegura que esté sobre la otra línea */
}

/* Estilos para el overlay del dropdown de temporadas */
.overlay-dropdown {

var seasonButton = document.getElementById("toggle-seasons");
var seasonDropdown = document.getElementById("season-dropdown");
var overlayDropdown = document.getElementById("overlay-dropdown-seasons");
var isDragging = false;
var playButton = document.getElementById("reproducirBtn");
var videoElement = document.getElementById("my-video");
var videoSource = document.getElementById("video-source");

document.addEventListener("DOMContentLoaded", function () {
    updateSeasonButtonText();
    loadSeasons();
    loadEpisodes(currentSeason);

    if (videoElement) {
        window.player = videojs(videoElement, {
            controlBar: {
                playToggle: false,
                volumePanel: false,
                fullscreenToggle: false,
                pipToggle: false,
                progressControl: true,
                remainingTimeDisplay: true,
                currentTimeDisplay: true,
            },
            userActions: {
                doubleClick: false,
                hotkeys: false
            }
        });

        document.addEventListener("fullscreenchange", handleFullscreenExit);
        document.addEventListener("webkitfullscreenchange", handleFullscreenExit);
        document.addEventListener("mozfullscreenchange", handleFullscreenExit);
        document.addEventListener("MSFullscreenChange", handleFullscreenExit);
    }

    playButton.addEventListener("click", function () {
        reproducirPrimerEpisodio();
    });
});

function reproducirPrimerEpisodio() {
    var firstEpisode = playlist.seasons[currentSeason].episodes[0];
    if (firstEpisode) {
        playEpisode(firstEpisode.video_url, firstEpisode.title, `T${currentSeason + 1} E1`);
    }
}

function playEpisode(url, title, episodeCode) {
    if (url) {
        window.player.src({ type: "video/mp4", src: url });
        window.player.play();
        playButton.textContent = `Reproducir: ${title} (${episodeCode})`;

        if (videoElement.requestFullscreen) {
            videoElement.requestFullscreen();
        } else if (videoElement.webkitRequestFullscreen) {
            videoElement.webkitRequestFullscreen();
        } else if (videoElement.mozRequestFullScreen) {
            videoElement.mozRequestFullScreen();
        } else if (videoElement.msRequestFullscreen) {
            videoElement.msRequestFullscreen();
        }
    } else {
        console.error("No se encontró una URL de video.");
    }
}

function updateSeasonButtonText() {
    seasonButton.innerHTML = playlist.seasons[currentSeason].season_title + ' <span class="material-icons">expand_more</span>';
}

function loadSeasons() {
    var seasonList = document.getElementById("season-list");
    seasonList.innerHTML = "";

    playlist.seasons.forEach(function (season, index) {
        var item = document.createElement("li");
        item.classList.add("season-item");
        item.textContent = season.season_title;

        var checkIcon = document.createElement("span");
        checkIcon.classList.add("check-icon", "material-icons");
        checkIcon.textContent = "check";

        if (index === currentSeason) {
            item.classList.add("active");
            item.appendChild(checkIcon);
        }

        item.addEventListener("click", function () {
            currentSeason = index;
            localStorage.setItem("selectedSeason", currentSeason);
            seasonDropdown.classList.remove("active");
            overlayDropdown.classList.remove("active");
            loadSeasons();
            loadEpisodes(currentSeason);
            updateSeasonButtonText();
        });

        seasonList.appendChild(item);
    });
}

function loadEpisodes(seasonIndex) {
    var episodeList = document.getElementById("episode-list");
    episodeList.innerHTML = "";
    var season = playlist.seasons[seasonIndex];

    season.episodes.forEach(function (episode, episodeIndex) {
        var item = document.createElement("li");
        item.classList.add("episode-item");

        var episodeCode = `T${seasonIndex + 1} E${episodeIndex + 1}`;

        item.innerHTML =
            '<div class="episode">' +
            '<div class="episode-thumbnail">' +
            '<img src="' + episode.image + '" alt="' + episode.title + '" class="episode-image">' +
            '<div class="progress-bar-container"><div class="progress-bar"></div></div>' +
            '</div>' +
            '<div class="episode-info">' +
            '<h3 class="episode-title">' + episode.title + '</h3>' +
            '<p class="episode-duration">' + episode.duration + '</p>' +
            '<a href="' + episode.download_link + '" class="download-link" download="' + episode.title + '.mp4">' +
            '<span class="material-icons">arrow_downward</span></a>' +
            '</div>' +
            '<span class="episode-code" style="display: none;">' + episodeCode + '</span>' +
            '</div>';

        item.querySelector(".download-link").addEventListener("click", function (event) {
            event.stopPropagation();
        });

        item.addEventListener("click", function () {
            playEpisode(episode.video_url, episode.title, episodeCode);
        });

        episodeList.appendChild(item);
    });
}



function playEpisode(url) {
    if (window.player) {
        window.player.src({ type: "video/mp4", src: url });
        window.player.play();
        var videoElement = document.getElementById("my-video");
        if (videoElement.requestFullscreen) {
            videoElement.requestFullscreen();
        } else if (videoElement.webkitRequestFullscreen) {
            videoElement.webkitRequestFullscreen();
        } else if (videoElement.mozRequestFullScreen) {
            videoElement.mozRequestFullScreen();
        } else if (videoElement.msRequestFullscreen) {
            videoElement.msRequestFullscreen();
        }
    }
}

function handleFullscreenExit() {
    if (!document.fullscreenElement && !document.webkitFullscreenElement &&
        !document.mozFullScreenElement && !document.msFullscreenElement) {
        if (window.player) {
            window.player.pause();
        }
    }
}


seasonButton.addEventListener("click", function () {
    var isActive = seasonDropdown.classList.contains("active");
    seasonDropdown.classList.toggle("active", !isActive);
    overlayDropdown.classList.toggle("active", !isActive);
});

overlayDropdown.addEventListener("click", function () {
    seasonDropdown.classList.remove("active");
    overlayDropdown.classList.remove("active");
});

var startY;
seasonDropdown.addEventListener("touchstart", function (e) {
    startY = e.touches[0].clientY;
    isDragging = false;
});

seasonDropdown.addEventListener("touchmove", function (e) {
    var moveY = e.touches[0].clientY;
    var diffY = moveY - startY;
    if (diffY < -50) {
        seasonDropdown.style.bottom = "0px";
    } else if (diffY > 50) {
        seasonDropdown.style.bottom = "-100%";
        overlayDropdown.classList.remove("active");
    }
    isDragging = true;
});

seasonDropdown.addEventListener("touchend", function () {
    if (!isDragging) {
        seasonDropdown.classList.remove("active");
        overlayDropdown.classList.remove("active");
    }
});



// Funcionalidad de cambio de pestañas (tabs)
document.addEventListener("DOMContentLoaded", () => {
    updateSeasonButtonText();
    loadSeasons();
    loadEpisodes(currentSeason);

    const tabs = document.querySelectorAll(".tab");
    const contents = document.querySelectorAll(".content");

    tabs.forEach(tab => {
        tab.addEventListener("click", () => {
            // Remover la clase "active" de todas las pestañas y contenidos
            tabs.forEach(t => t.classList.remove("active"));
            contents.forEach(c => c.classList.remove("active"));

            // Agregar la clase "active" solo a la pestaña y contenido correspondiente
            tab.classList.add("active");
            const contentId = tab.id.replace("-tab", "-content");
            document.getElementById(contentId).classList.add("active");
        });
    });
});
