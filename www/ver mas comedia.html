* {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      background: rgba(0, 0, 0, 0); /* Fondo completamente transparente */
    }
    body {
      padding-top: env(safe-area-inset-top);
            font-family: 'Roboto', sans-serif;
            background: url('https://od.lk/s/M18zMTUyODE5NjJf/comedia%20fondo.jpg') no-repeat center center fixed;
            background-size: cover; /* Asegura que la imagen cubra toda la pantalla */
            color: #ffffff;
            overflow-x: hidden;
        }
  /* Estilo para el header */
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background-color: rgba(0, 0, 0, 0); /* Fondo transparente al inicio */
  padding: 10px 20px;
  z-index: 1000;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: background-color 1s ease; /* Transición suave para el fondo */
}

/* Título en el header */
.movie-title {
            font-size: 18px;
            font-weight: bold;
            color: white;
            opacity: 0; /* Inicialmente oculto */
            transform: translateY(-100%); /* Inicialmente desplazado hacia arriba */
            transition: opacity 1s ease, transform 1s ease, left 1s ease;
            position: absolute;
            left: 150px; /* Posición inicial */
            top: 15px;
        }

        /* Título centrado */
        .movie-title.centered {
            transform: translateY(0); /* Baja a su posición original */
            opacity: 1;
            left: 50%; /* Mueve el título al centro */
            transform: translateX(-50%); /* Asegura que quede centrado horizontalmente */
        }

/* Estilo para el link de la flecha */
.chevron-link {
  color: white; /* Flecha en blanco */
  font-size: 40px; /* Tamaño más grande de la flecha */
  text-decoration: none; /* Sin subrayado */
  display: inline-flex; /* Asegura que el fondo se adapte al tamaño de la flecha */
  align-items: center;
  justify-content: center;
  width: 30px; /* Tamaño del círculo */
  height: 30px; /* Tamaño del círculo */
  border-radius: 50%; /* Círculo perfecto */
  background-color: rgba(0, 0, 0, 0.288); /* Fondo negro transparente */
  padding: 10px; /* Padding dentro del círculo */
}

/* Alineación del ícono */
.chevron-link i {
  vertical-align: middle;
  font-size: 30px; /* Ajustar tamaño de la flecha dentro del círculo */
}



/* Evitar que los íconos estén pegados a los bordes */
.chevron-link {
  color: white;
  font-size: 1.5rem;
  text-decoration: none;
}


.icons i {
  font-size: 1.2rem;
  cursor: pointer;
}


.container {
    margin-top: 80px; /* Para que no quede cubierto por el header */
    display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        padding: 10px;
        max-width: 800px; /* Limita el ancho para que no se expandan demasiado en pantallas grandes */
        
    }

.movie {
    text-align: center;
}

.movie a {
    text-decoration: none;
    color: #fff;
}

.movie img {
        width: 100%;
        height: auto;
        aspect-ratio: 2 / 3; /* Mantiene la proporción de póster */
        object-fit: cover;
        border-radius: 10px;
        max-width: 180px; /* Tamaño máximo en vertical */
        display: block;
        margin: auto;
    }

    @media screen and (orientation: landscape) {
        .movies-container {
            grid-template-columns: repeat(3, 1fr);
            max-width: 1000px; /* Aumenta el ancho en horizontal */
        }

        .movie img {
            max-width: 200px; /* Tamaño ajustado para que no sean muy pequeñas */
        }
    }

.movie img:hover {
    transform: scale(1.05);
}


        .footer {
display: flex;
align-items: center;
position: fixed;
bottom: 0;
left: 0;
width: 100%;
background-color: rgba(27, 27, 27, 0.877);
padding: 10px 0;
height: 60px;
z-index: 1000;
justify-content: space-around;
transition: transform 0.3s ease-in-out;
}

.footer.hidden {
  transform: translateY(100%);
}

.footer.hidden {
  transform: translateY(100%);
}

.footer-icon {
  color: #bbb; /* Icono gris cuando está inactivo */
  text-align: center;
  text-decoration: none;
  font-size: 35px; /* Tamaño aumentado para los iconos */
  flex: 1; /* Ocupa el mismo espacio cada icono */
  display: flex;
  flex-direction: column;
  align-items: center;
  text-decoration: none;
  transition: color 0.3s ease, transform 0.3s ease; /* Animación suave al pasar el cursor */
}

/* Para asegurarnos de que los iconos aumenten correctamente */
.footer-icon .material-icons, .footer-icon .material-icons-outlined {
  font-size: inherit; /* Heredar el tamaño de fuente del contenedor */
  transition: font-size 0.3s ease;
}

.footer-icon:hover {
  color: #fff; /* Cambia a blanco al pasar el cursor */
}

.footer-icon.active {
  color: #fff; /* Cambiar a blanco cuando está activo */
}

.footer-icon.active .material-icons-outlined {
  display: none; /* Oculta el icono outline cuando está activo */
}

.footer-icon.active .material-icons {
  display: inline-block; /* Muestra el icono normal cuando está activo */
}

/* Oculta los iconos normales por defecto */
.footer-icon .material-icons {
  display: none;
}

/* Iconos outline por defecto */
.footer-icon .material-icons-outlined {
  display: inline-block;
}

/* Estilos para el icono de perfil */
.profile-icon-footer {
  width: 30px; /* Tamaño de la imagen de perfil */
  height: 30px; /* Tamaño de la imagen de perfil */
  border-radius: 50%; /* Hacer la imagen circular */
  border: 2px solid #696969; /* Borde blanco por defecto */
  object-fit: cover; /* Asegura que la imagen se recorte bien */
  transition: border-color 0.3s ease; /* Transición suave para el borde */
}

/* Cambiar el color del borde cuando el icono esté activo */
.footer-icon.active .profile-icon-footer {
  border-color: #ffffff; /* Cambiar el borde a azul cuando esté activo */
}


/* Cambiar color de iconos inactivos */
.footer-icon.inactive .material-icons-outlined,
.footer-icon.inactive .material-icons {
  color: #929292; /* Gris para iconos inactivos */
}

         /* Esta media query asegura que las imágenes se mantengan consistentes en cualquier orientación */
         @media (orientation: landscape) {
            .container {
                grid-template-columns: repeat(3, 1fr); /* Mantiene las tres columnas incluso en horizontal */
            }

            .movie img {
                width: auto; /* Mantiene la proporción de las imágenes */
                height: 200px; /* Mantiene la altura fija */
                object-fit: cover; /* Sigue asegurando la proporción correcta */
            }
        }

/* Ocultar el nombre de la película */
#nombrePelicula {
  display: none; /* Este es el estilo que lo oculta */
}

/* Overlay para oscurecer la página */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgb(0, 0, 0); /* Oscurecimiento semitransparente */
    z-index: 9999; /* Asegura que esté encima de todos los Hotel Transylvania 4: Transformanía */
    opacity: 1;
    transition: opacity 2s ease-out; /* Cambio lento en opacidad */
    display: block; /* Asegura que el overlay esté visible inicialmente */
}

/* Cuando se ocultará */
.overlay.hidden {
    opacity: 0; /* Se desvanece */
    pointer-events: none; /* Evita interacciones mientras está oculto */
}

/* Loader */
#loader {
    display: block; /* Visible al cargar */
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: conic-gradient(
    from 90deg,
        #0066ff21 0%,
        #0066ff 60%,
        #ffffff 80%,
        #afafaf00 30%
    );
    mask: radial-gradient(farthest-side, transparent calc(100% - 8px), black);
    -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 8px), black);
    animation: spin 1.2s linear infinite, shine 2s ease-in-out infinite;
    opacity: 1 !important;
    transition: opacity 3s ease-out;
    z-index: 600000; /* Por encima de todo */
}

/* Animación de rotación */
@keyframes spin {
    0% { transform: translate(-50%, -50%) rotate(0deg); }
    100% { transform: translate(-50%, -50%) rotate(360deg); }
}

/* Animación de brillo */
@keyframes shine {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.8); }
}

    /* Deshabilitar selección de texto e interacciones */
body, img, a, button, select, textarea {
            -webkit-user-select: none; /* Safari */
            -moz-user-select: none; /* Firefox */
            -ms-user-select: none; /* IE10+/Edge */
            user-select: none; /* estándar */
        }

        /* Deshabilitar resaltado en elementos interactivos */
        a, button, select, textarea {
            -webkit-tap-highlight-color: transparent; /* Safari */
        
        }

       
    *:focus {
  outline: 3px solid #00f7ff;
  outline-offset: 2px;
  border-radius: 8px;
}

/* Ocultar focus en móviles (pantallas pequeñas) */
@media (max-width: 768px) {
  *:focus {
    outline: none !important;
    box-shadow: none !important;
  }
}

/* Mostrar focus en pantallas grandes (TV, PC) */
@media (min-width: 769px) {
  *:focus {
    outline: 3px solid #00f7ff;
    outline-offset: 2px;
    border-radius: 8px;
  }
}


.tabs-secondary {
  display: none;
  justify-content: center;

.tabs-secondary .tab {
  color: white;

  z-index: 3010;
}

.tabs-secondary .tab:hover {
  background-color: #81818179;
  border-radius: 8px;
}

@media screen and (min-width: 1024px) {
  .tabs-secondary {
    display: flex;
  }
}

@media screen and (min-width: 1200px) {
  /* Tabs grandes en pantallas grandes */
  .tabs-secondary {
    gap: 10px;
    padding: 16px 40px;
  }

  .tabs-secondary .tab {
    font-size: 22px;
    padding: 12px 10px 8px;
  }

  .tabs-secondary .tab.active::after {
    content: "";
    display: block;
    height: 4px;
    background-color: white;
    margin-top: 4px;
    border-radius: 2px;
  }
}

  <script>

    // Prevenir gestos táctiles no deseados
    document.addEventListener('touchmove', function (event) {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });

        var header = document.querySelector(".header");
var movieTitle = document.querySelector(".movie-title");

window.addEventListener("scroll", function () {
  var scrollTop = window.scrollY || document.documentElement.scrollTop;

  // Ajusta la opacidad del header
  var opacity = Math.min(scrollTop / 100, 1); // Aseguramos que no sobrepase 1
  header.style.backgroundColor = `rgba(1, 1, 29, ${opacity})`;

  // Muestra el título de la película cuando el header se oscurece
  if (scrollTop > 50) { // Cuando el desplazamiento es mayor a 50px
    movieTitle.style.opacity = 1;
    movieTitle.style.transform = "translateX(0)"; // El título vuelve a su lugar
  } else {
    movieTitle.style.opacity = 0;
    movieTitle.style.transform = "translateX(100%)"; // El título desaparece
  }
});

window.addEventListener('load', function () {
    const overlay = document.querySelector('.overlay');
    const loader = document.getElementById('loader');

    // Se mantiene el loader visible por 1 segundo
    setTimeout(() => {
        // Hacer que el loader desaparezca rápidamente
        loader.style.opacity = '0'; // Desvanecer loader
        setTimeout(() => {
            loader.style.display = 'none'; // Eliminarlo del flujo

            // Se añade clase "hidden" al overlay para que se desvanezca lentamente
            overlay.classList.add('hidden');
        }, 300); // Tiempo de transición de 300ms para el loader
    }, 1000); // Mantener el loader visible durante 1 segundo

});

    // Gestión de imágenes de perfil
const footerProfileIcon = document.getElementById("footerIconImg");
const headerProfileIcon = document.getElementById("headerProfileIcon"); // NUEVO
const profileImage = document.getElementById("profileImage");
const profilePageImage = document.getElementById("profilePageImage");

const defaultProfileIcon = document.getElementById("defaultProfileIcon");
const defaultProfileIconAlt = document.getElementById("defaultProfileIconAlt");

// Función para cambiar todas las imágenes de perfil
function updateProfileImage(src) {
  if (profileImage) profileImage.src = src;
  if (profilePageImage) profilePageImage.src = src;
  if (footerProfileIcon) footerProfileIcon.src = src;
  if (headerProfileIcon) headerProfileIcon.src = src;

  if (defaultProfileIcon) defaultProfileIcon.style.display = 'none';
  if (defaultProfileIconAlt) defaultProfileIconAlt.style.display = 'none';

  localStorage.setItem('profileImage', src);
}

// Restaurar la imagen de perfil guardada al cargar la página
window.addEventListener('load', function () {
  const storedProfileImage = localStorage.getItem('profileImage');
  if (storedProfileImage) {
    if (footerProfileIcon) footerProfileIcon.src = storedProfileImage;
    if (headerProfileIcon) headerProfileIcon.src = storedProfileImage;
    if (profileImage) profileImage.src = storedProfileImage;
    if (profilePageImage) profilePageImage.src = storedProfileImage;

    if (defaultProfileIcon) defaultProfileIcon.style.display = 'none';
    if (defaultProfileIconAlt) defaultProfileIconAlt.style.display = 'none';
  }
});
  
  // Ocultar footer al hacer scroll hacia abajo
  var lastScrollTop = 0;
  var footer = document.querySelector(".footer");
  
  window.addEventListener("scroll", function () {
      var currentScroll = window.scrollY;
  
      if (currentScroll > lastScrollTop) {
          footer.classList.add("hidden");
      } else {
          footer.classList.remove("hidden");
      }
  
      lastScrollTop = currentScroll;
  });
  </script>
