        /* Estilo para el header */
.header {
    position: fixed; /* Fijo en la parte superior */
    top: 0;
    left: 0;
    width: 100%;
    height: 60px;
    display: flex;
    align-items: center;
    padding: 0 20px;
    background: rgba(0, 0, 0, 0); /* Inicialmente transparente */
    z-index: 10;
    transition: background-color 0.3s ease; /* Transición suave para el color de fondo */
    justify-content: space-between; /* Para que el contenido esté separado */
}

/* Contenedor para el logo */
.header-logo {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%; /* Ocupa todo el ancho */
    position: absolute; /* Asegura que esté posicionado dentro del header */
    text-align: center;
    transition: opacity 0.5s ease; /* Transición suave para el logo */
    opacity: 0; /* Inicialmente oculto */
    top: 50%; /* Centrado verticalmente */
    left: 0px; /* Desplazado un poco a la izquierda */
    transform: translateY(-50%); /* Centrado verticalmente */
}


.header-logo img {
    max-width: 80px; /* Tamaño más pequeño */
    height: auto;
}

.footer-icon {
  color: #bbb; /* Icono gris cuando está inactivo */
  text-align: center;
  text-decoration: none;
  font-size: 35px; /* Tamaño aumentado para los iconos */
  flex: 1; /* Ocupa el mismo espacio cada icono */
  display: flex;
  flex-direction: column;
  align-items: center;
  text-decoration: none;
  transition: color 0.3s ease, transform 0.3s ease; /* Animación suave al pasar el cursor */
}

/* Para asegurarnos de que los iconos aumenten correctamente */
.footer-icon .material-icons, .footer-icon .material-icons-outlined {
  font-size: inherit; /* Heredar el tamaño de fuente del contenedor */
  transition: font-size 0.3s ease;
}

.footer-icon:hover {
  color: #fff; /* Cambia a blanco al pasar el cursor */
}

.footer-icon.active {
  color: #fff; /* Cambiar a blanco cuando está activo */
}

.footer-icon.active .material-icons-outlined {
  display: none; /* Oculta el icono outline cuando está activo */
}

.footer-icon.active .material-icons {
  display: inline-block; /* Muestra el icono normal cuando está activo */
}

/* Oculta los iconos normales por defecto */
.footer-icon .material-icons {
  display: none;
}

/* Iconos outline por defecto */
.footer-icon .material-icons-outlined {
  display: inline-block;
}

/* Estilos para el icono de perfil */
.profile-icon-footer {
  width: 35px; /* Tamaño de la imagen de perfil */
  height: 35px; /* Tamaño de la imagen de perfil */
  border-radius: 50%; /* Hacer la imagen circular */
  border: 2px solid #fff; /* Borde blanco alrededor de la imagen */
  object-fit: cover; /* Asegura que la imagen se recorte bien */
}

/* Cambiar color de iconos inactivos */
.footer-icon.inactive .material-icons-outlined,
.footer-icon.inactive .material-icons {
  color: #bbb; /* Gris para iconos inactivos */
}

.horizontal-scroll-container {
    display: flex;
    overflow-x: auto; /* Scroll horizontal */
    white-space: nowrap; /* Evitar que los elementos se rompan en varias líneas */
    padding: 5px;
    border: 2px solid #66666600;
    background-color: #00000000;
    scrollbar-width: thin; /* Firefox */
    scrollbar-color: #666 #333; /* Firefox */
}

/* Estilos para escritorio */
@media (min-width: 768px) {
    .horizontal-scroll-container::-webkit-scrollbar {
        height: 8px; /* Altura del scrollbar */
        background-color: #333;
    }

    .horizontal-scroll-container::-webkit-scrollbar-thumb {
        background-color: #666;
    }
}

/* Estilos para móvil (opcional: ocultar completamente el scrollbar) */
@media (max-width: 767px) {
    .horizontal-scroll-container::-webkit-scrollbar {
        display: none; /* Ocultar scrollbar en dispositivos móviles */
    }
}

.horizontal-scroll-container a {
    display: inline-block; /* Elementos en línea */
    margin-right: 10px; /* Espaciado entre imágenes */
}

.horizontal-scroll-container img {
    width: 250px; /* Tamaño fijo para las imágenes */
    height: auto;
    border-radius: 7px; /* Bordes redondeados */
    transition: transform 0.3s ease-in-out;
}

.horizontal-scroll-container img:hover {
    transform: scale(1.1); /* Efecto de zoom */
    cursor: pointer;
}

   /* Overlay para oscurecer la página */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgb(0, 0, 0); /* Oscurecimiento semitransparente */
    z-index: 9999; /* Asegura que esté encima de todos los elementos */
    opacity: 1;
    transition: opacity 2s ease-out; /* Cambio lento en opacidad */
    display: block; /* Asegura que el overlay esté visible inicialmente */
}

/* Cuando se ocultará */
.overlay.hidden {
    opacity: 0; /* Se desvanece */
    pointer-events: none; /* Evita interacciones mientras está oculto */
}

/* Loader */
#loader {
    display: block; /* Visible al cargar */
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: conic-gradient(
    from 90deg,
        #0066ff21 0%,
        #0066ff 60%,
        #ffffff 80%,
        #afafaf00 30%
    );
    mask: radial-gradient(farthest-side, transparent calc(100% - 8px), black);
    -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 8px), black);
    animation: spin 1.2s linear infinite, shine 2s ease-in-out infinite;
    opacity: 1 !important;
    transition: opacity 3s ease-out;
    z-index: 600000; /* Por encima de todo */
}

/* Animación de rotación */
@keyframes spin {
    0% { transform: translate(-50%, -50%) rotate(0deg); }
    100% { transform: translate(-50%, -50%) rotate(360deg); }
}

/* Animación de brillo */
@keyframes shine {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.8); }
}

/* Deshabilitar selección de texto e interacciones */
body, img, a, button, select, textarea {
            -webkit-user-select: none; /* Safari */
            -moz-user-select: none; /* Firefox */
            -ms-user-select: none; /* IE10+/Edge */
            user-select: none; /* estándar */
        }

        /* Deshabilitar resaltado en elementos interactivos */
        a, button, select, textarea {
            -webkit-tap-highlight-color: transparent; /* Safari */
        
        }

  *:focus {
  outline: 3px solid #00f7ff;
  outline-offset: 2px;
  border-radius: 8px;
}

/* Ocultar focus en móviles (pantallas pequeñas) */
@media (max-width: 768px) {
  *:focus {
    outline: none !important;
    box-shadow: none !important;
  }
}

/* Mostrar focus en pantallas grandes (TV, PC) */
@media (min-width: 769px) {
  *:focus {
    outline: 3px solid #00f7ff;
    outline-offset: 2px;
    border-radius: 8px;
  }
}

    <script>

        // Prevenir gestos táctiles no deseados
   document.addEventListener('touchmove', function (event) {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });

window.addEventListener('scroll', function() {
    const header = document.querySelector('.header');
    const hero = document.querySelector('.hero');
    const heroHorizontal = document.querySelector('.hero-horizontal');
    const headerLogo = document.querySelector('.header-logo');
    
    // Obtener la cantidad de desplazamiento
    const scrollPosition = window.scrollY;

    // Ajustar el color de fondo del header según el desplazamiento
    const opacity = Math.min(scrollPosition / 200, 1); // Aumenta la opacidad según el desplazamiento
    header.style.backgroundColor = `rgba(1, 1, 29, ${opacity})`;

    // Mostrar el logo en el header cuando el fondo se oscurezca
    if (opacity > 0.5) {
        headerLogo.style.opacity = '1'; // Mostrar el logo con transición suave
    } else {
        headerLogo.style.opacity = '0'; // Ocultar el logo con transición suave
    }

    // Oscurecer la imagen principal (hero) completamente según el desplazamiento
    const filterIntensity = Math.min(scrollPosition / 400, 1); // Oscurecer completamente la imagen
    hero.style.filter = `brightness(${1 - filterIntensity})`;

    // Si estamos en modo horizontal, oscurecer más la imagen
    if (window.innerHeight < window.innerWidth) { // Detectar si la pantalla está en modo horizontal
        heroHorizontal.style.filter = `brightness(${1 - filterIntensity})`;
    }
});

window.addEventListener('load', function () {
    const overlay = document.querySelector('.overlay');
    const loader = document.getElementById('loader');

    // Se mantiene el loader visible por 1 segundo
    setTimeout(() => {
        // Hacer que el loader desaparezca rápidamente
        loader.style.opacity = '0'; // Desvanecer loader
        setTimeout(() => {
            loader.style.display = 'none'; // Eliminarlo del flujo

            // Se añade clase "hidden" al overlay para que se desvanezca lentamente
            overlay.classList.add('hidden');
        }, 300); // Tiempo de transición de 300ms para el loader
    }, 1000); // Mantener el loader visible durante 1 segundo

});

      // Gestión de imágenes de perfil
const footerProfileIcon = document.getElementById("footerIconImg");
const headerProfileIcon = document.getElementById("headerProfileIcon"); // NUEVO
const profileImage = document.getElementById("profileImage");
const profilePageImage = document.getElementById("profilePageImage");

const defaultProfileIcon = document.getElementById("defaultProfileIcon");
const defaultProfileIconAlt = document.getElementById("defaultProfileIconAlt");

// Función para cambiar todas las imágenes de perfil
function updateProfileImage(src) {
  if (profileImage) profileImage.src = src;
  if (profilePageImage) profilePageImage.src = src;
  if (footerProfileIcon) footerProfileIcon.src = src;
  if (headerProfileIcon) headerProfileIcon.src = src;

  if (defaultProfileIcon) defaultProfileIcon.style.display = 'none';
  if (defaultProfileIconAlt) defaultProfileIconAlt.style.display = 'none';

  localStorage.setItem('profileImage', src);
}

// Restaurar la imagen de perfil guardada al cargar la página
window.addEventListener('load', function () {
  const storedProfileImage = localStorage.getItem('profileImage');
  if (storedProfileImage) {
    if (footerProfileIcon) footerProfileIcon.src = storedProfileImage;
    if (headerProfileIcon) headerProfileIcon.src = storedProfileImage;
    if (profileImage) profileImage.src = storedProfileImage;
    if (profilePageImage) profilePageImage.src = storedProfileImage;

    if (defaultProfileIcon) defaultProfileIcon.style.display = 'none';
    if (defaultProfileIconAlt) defaultProfileIconAlt.style.display = 'none';
  }
});
  
  // Ocultar footer al hacer scroll hacia abajo
  var lastScrollTop = 0;
  var footer = document.querySelector(".footer");
  
  window.addEventListener("scroll", function () {
      var currentScroll = window.scrollY;
  
      if (currentScroll > lastScrollTop) {
          footer.classList.add("hidden");
      } else {
          footer.classList.remove("hidden");
      }
  
      lastScrollTop = currentScroll;
  });

    </script>
</body>
</html>
