  <script>
     window.addEventListener('load', function () {
  const overlay = document.querySelector('.overlay-loader-page');
  const loader = document.getElementById('loader');

  // Se mantiene el loader visible por 1 segundo
  setTimeout(() => {
    loader.style.opacity = '0'; // Corrige esto: '2' no tiene efecto visual
    setTimeout(() => {
      loader.style.display = 'none';
      overlay.classList.add('hidden');
    }, 300);
  }, 1000);
});



   // Funciona para contenedores verticales
document.querySelectorAll('.scroll-container').forEach(container => {
  const scroll = container.querySelector('.scroll-poster');
  container.querySelector('.arrow.left').onclick = () => scroll.scrollBy({ left: -600, behavior: 'smooth' });
  container.querySelector('.arrow.right').onclick = () => scroll.scrollBy({ left: 600, behavior: 'smooth' });
});

// Funciona para contenedores horizontales
document.querySelectorAll('.scroll-container-horizontal').forEach(container => {
  const scroll = container.querySelector('.scroll-poster-horizontal');
  container.querySelector('.arrow.left').onclick = () => scroll.scrollBy({ left: -600, behavior: 'smooth' });
  container.querySelector('.arrow.right').onclick = () => scroll.scrollBy({ left: 600, behavior: 'smooth' });
});

document.addEventListener("DOMContentLoaded", function () {
  const header = document.getElementById('header');
  const pageLogo = document.getElementById('page-logo');

  if (!header || !pageLogo) return;

  window.addEventListener('scroll', () => {
    const scrollY = window.scrollY;
    const maxScroll = 300;

    const opacity = Math.min(scrollY / maxScroll, 1);
    const logoOpacity = scrollY > 150 ? opacity : 0;

    header.style.backgroundColor = `rgba(1, 1, 29, ${opacity})`;
    pageLogo.style.opacity = logoOpacity;
  });
});


// ================================
// 👤 PERFIL – sincronizar imágenes
// ================================
function updateProfileImage(src) {
  if (!src) return;

  const ids = [
    "footerIconImg",
    "profileImage",
    "profilePageImage",
    "headerProfileIcon",
    "editableProfile",
    "editableProfileInModal"
  ];

  ids.forEach(id => {
    const el = document.getElementById(id);
    if (el && el.tagName === "IMG") {
      el.src = src;
    }
  });

  // Ocultar iconos por defecto si existen
  const defaultIcon = document.getElementById("defaultProfileIcon");
  if (defaultIcon) defaultIcon.style.display = "none";

  const defaultIconAlt = document.getElementById("defaultProfileIconAlt");
  if (defaultIconAlt) defaultIconAlt.style.display = "none";

  // Guardar imagen
  localStorage.setItem("profileImage", src);
}

// Restaurar al cargar página
document.addEventListener("DOMContentLoaded", () => {
  const savedProfileImage = localStorage.getItem("profileImage");
  if (savedProfileImage) {
    updateProfileImage(savedProfileImage);
  }
});
// Función para cambiar todas las imágenes de perfil
function updateProfileImage(src) {
  const ids = [
    "footerIconImg",
    "footerProfileImage",
    "profileImage",
    "profilePageImage",
    "editableProfile",
    "editableProfileInModal",
    "headerProfileIcon"
  ];

  ids.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.src = src;
  });

  // Ocultar iconos por defecto si existen
  const defaultIcon = document.getElementById("defaultProfileIcon");
  if (defaultIcon) defaultIcon.style.display = "none";

  const defaultIconAlt = document.getElementById("defaultProfileIconAlt");
  if (defaultIconAlt) defaultIconAlt.style.display = "none";

  // Guardar en localStorage
  localStorage.setItem("profileImage", src);
}

// Restaurar la imagen de perfil guardada al cargar la página
window.addEventListener("load", () => {
  const storedProfileImage = localStorage.getItem("profileImage");
  if (storedProfileImage) {
    updateProfileImage(storedProfileImage); // Reutilizamos la función
  }
});


var lastScrollTop = 0;
    var footer = document.querySelector(".footer");

    window.addEventListener("scroll", function () {
        var currentScroll = window.scrollY;

        if (currentScroll > lastScrollTop) {
            // Desliza hacia abajo -> Ocultar footer
            footer.classList.add("hidden");
        } else {
            // Desliza hacia arriba -> Mostrar footer
            footer.classList.remove("hidden");
        }

        lastScrollTop = currentScroll;
    });

  </script>
