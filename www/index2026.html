<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inicio App</title>

  <!-- Swiper -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

  <!-- Material Icons Outlined -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #030303;
      color: #fff;
    }

    /* ===== HEADER (HBO MAX STYLE) ===== */
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 100;
      background: linear-gradient(to bottom, rgba(3,3,3,.85), rgba(3,3,3,0));
    }

    header img { height: 38px; }

    header .material-icons-outlined {
      font-size: 28px;
      cursor: pointer;
    }

    /* ===== TABS ===== */
    .tabs {
      position: fixed;
      top: 64px;
      width: 100%;
      display: flex;
      gap: 20px;
      padding: 10px 20px;
      background: linear-gradient(to bottom, rgba(3,3,3,.9), rgba(3,3,3,.6));
      z-index: 90;
    }

    .tab {
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      opacity: .6;
    }

    .tab.active {
      opacity: 1;
    }

    /* ===== SECTIONS ===== */
    .section { display: none; }
    .section.active { display: block; }

    /* ===== HERO SWIPER ===== */
    .hero-swiper {
      width: 100%;
      height: 100vh;
    }

    .swiper-slide { position: relative; }

    .swiper-slide img.bg {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .gradient-top {
      position: absolute;
      top: 0;
      width: 100%;
      height: 30%;
      background: linear-gradient(to bottom, rgba(0,0,0,.7), transparent);
      z-index: 2;
    }

    .gradient-bottom {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 45%;
      background: linear-gradient(to top, rgba(0,0,0,.9), transparent);
      z-index: 2;
    }

    .content {
      position: absolute;
      bottom: 90px;
      left: 40px;
      max-width: 520px;
      z-index: 3;
    }

    .content img.logo {
      width: 200px;
      margin-bottom: 12px;
    }

    .meta {
      font-size: 13px;
      opacity: .85;
      margin-bottom: 10px;
    }

    .desc {
      font-size: 15px;
      line-height: 1.45;
    }

    /* ===== ROWS HBO STYLE ===== */
    .rows {
      position: relative;
      margin-top: -120px;
      padding-bottom: 40px;
      z-index: 10;
    }

    .row {
      margin: 25px 0;
    }

    .row h3 {
      font-size: 18px;
      font-weight: 600;
      margin: 0 0 12px 20px;
    }

    .row .swiper {
      padding-left: 20px;
    }

    .row .swiper-slide {
      width: 150px;
    }

    .row .swiper-slide img {
      width: 100%;
      border-radius: 6px;
    }

    /* ===== DESKTOP ONLY ===== */
    .desktop-only { display: none; }
    @media (orientation: landscape) and (min-width: 1024px) {
      .desktop-only { display: block; }
    }
  </style>
</head>
<body>

<header>
  <img src="logo-app.png" alt="Logo App">
  <span class="material-icons-outlined">notifications</span>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab(0)">Inicio</div>
  <div class="tab" onclick="showTab(1)">Películas</div>
  <div class="tab" onclick="showTab(2)">Series</div>
  <div class="tab" onclick="showTab(3)">Anime</div>
  <div class="tab" onclick="showTab(4)">Estrenos</div>
  <div class="tab" onclick="showTab(5)">Favoritos</div>
</div>

<div id="sections">

  <div class="section active">

    <!-- HERO -->
    <div class="swiper hero-swiper">
      <div class="swiper-wrapper">

        <div class="swiper-slide">
          <img class="bg" src="https://image.tmdb.org/t/p/original/qbBVbnyG3jH8wHfU6CQolhRBzIA.jpg">
          <div class="gradient-top"></div>
          <div class="gradient-bottom"></div>
          <div class="content">
            <img class="logo" src="logo-movie1.png">
            <div class="meta">2024 • Acción • 2h 10m</div>
            <div class="desc">Descripción breve de la película destacada.</div>
          </div>
        </div>

        <div class="swiper-slide desktop-only">
          <img class="bg" src="img-horizontal-1.jpg">
          <div class="gradient-top"></div>
          <div class="gradient-bottom"></div>
          <div class="content">
            <img class="logo" src="logo-movie2.png">
            <div class="meta">2023 • Drama</div>
            <div class="desc">Contenido exclusivo para pantallas grandes.</div>
          </div>
        </div>

      </div>
    </div>

    <!-- ROWS -->
    <div class="rows">

      <div class="row">
        <h3>Tendencias</h3>
        <div class="swiper row-swiper">
          <div class="swiper-wrapper">
            <div class="swiper-slide"><img src="poster1.jpg"></div>
            <div class="swiper-slide"><img src="poster2.jpg"></div>
            <div class="swiper-slide"><img src="poster3.jpg"></div>
            <div class="swiper-slide"><img src="poster4.jpg"></div>
          </div>
        </div>
      </div>

      <div class="row">
        <h3>Recomendado para ti</h3>
        <div class="swiper row-swiper">
          <div class="swiper-wrapper">
            <div class="swiper-slide"><img src="poster5.jpg"></div>
            <div class="swiper-slide"><img src="poster6.jpg"></div>
            <div class="swiper-slide"><img src="poster7.jpg"></div>
            <div class="swiper-slide"><img src="poster8.jpg"></div>
          </div>
        </div>
      </div>

    </div>

  </div>

  <div class="section"></div>
  <div class="section"></div>
  <div class="section"></div>
  <div class="section"></div>
  <div class="section"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
  new Swiper('.hero-swiper', {
    loop: true,
    autoplay: { delay: 5000, disableOnInteraction: false }
  });

  document.querySelectorAll('.row-swiper').forEach(sw => {
    new Swiper(sw, {
      slidesPerView: 'auto',
      spaceBetween: 12
    });
  });

  function showTab(index) {
    document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active', i===index));
    document.querySelectorAll('.section').forEach((s,i)=>s.classList.toggle('active', i===index));
  }
</script>

</body>
</html>
