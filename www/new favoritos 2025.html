.overlay {

}

/* Cuando se ocultará */
.overlay.hidden {
    opacity: 0; /* Se desvanece */
    pointer-events: none; /* Evita interacciones mientras está oculto */
}

/* Loader */
#loader {
    display: block; /* Visible al cargar */
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: conic-gradient(
    from 90deg,
        #0066ff21 0%,
        #0066ff 60%,
        #ffffff 80%,
        #afafaf00 30%
    );
    mask: radial-gradient(farthest-side, transparent calc(100% - 8px), black);
    -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 8px), black);
    animation: spin 1.2s linear infinite, shine 2s ease-in-out infinite;
    opacity: 1 !important;
    transition: opacity 3s ease-out;
    z-index: 600000; /* Por encima de todo */
}

/* Animación de rotación */
@keyframes spin {
    0% { transform: translate(-50%, -50%) rotate(0deg); }
    100% { transform: translate(-50%, -50%) rotate(360deg); }
}

/* Animación de brillo */
@keyframes shine {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.8); }
}

  <script>




    // Prevenir gestos táctiles no deseados
document.addEventListener('touchmove', function (event) {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });

window.addEventListener('load', function () {
    const overlay = document.querySelector('.overlay');
    const loader = document.getElementById('loader');

    // Se mantiene el loader visible por 1 segundo
    setTimeout(() => {
        // Hacer que el loader desaparezca rápidamente
        loader.style.opacity = '0'; // Desvanecer loader
        setTimeout(() => {
            loader.style.display = 'none'; // Eliminarlo del flujo

            // Se añade clase "hidden" al overlay para que se desvanezca lentamente
            overlay.classList.add('hidden');
        }, 300); // Tiempo de transición de 300ms para el loader
    }, 1000); // Mantener el loader visible durante 1 segundo

    mostrarFavoritos(); // Llamar a la función de mostrar los favoritos

    // Escuchar cambios en los favoritos
    window.addEventListener("favoritosActualizados", function () {
        mostrarFavoritos();
    });
});

document.addEventListener('DOMContentLoaded', () => {
    const openingScreen = document.getElementById('opening-screen');

    // Verifica si el usuario ya vio el opening
    if (window.location.pathname.includes("home") && !sessionStorage.getItem('appOpened')) {
        // Muestra el opening si es la página de inicio y no se ha mostrado antes
        if (openingScreen) {
            openingScreen.style.display = 'flex';
            setTimeout(() => {
                openingScreen.style.opacity = '0'; // Fade-out
                setTimeout(() => {
                    openingScreen.style.display = 'none'; // Oculta el opening
                    sessionStorage.setItem('appOpened', 'true'); // Marca como visto
                }, 1500); // Tiempo sincronizado con el fade-out
            }, 4000); // Duración del opening
        }
    } else {
        // Oculta el opening inmediatamente si ya fue visto o no es la página Home
        if (openingScreen) {
            openingScreen.style.display = 'none';
        }
    }

    // Manejo del footer para navegación
    const footerLinks = document.querySelectorAll('.footer-icon a');
    footerLinks.forEach(link => {
        link.addEventListener('click', (event) => {
            const href = event.target.closest('a').getAttribute('href');
            if (href.startsWith("go:")) {
                event.preventDefault(); // Evita el comportamiento predeterminado
                const page = href.split(':')[1]; // Extrae la página del href (e.g., "home", "favoritos")
                window.location.href = `${page}.html`; // Navega a la página correspondiente
            }
        });
    });
});

function mostrarFavoritos() {
  const favoritoInfo = document.getElementById("favoritoInfo");
  const favoritos = JSON.parse(localStorage.getItem("favoritos")) || [];

  favoritoInfo.innerHTML = ""; // Limpiar contenido existente

  favoritos.forEach(function (favorito, index) {
    const favoritoEnlace = document.createElement("a");
    favoritoEnlace.href = favorito.enlace;

    const contenedorFavorito = document.createElement("div");
    contenedorFavorito.classList.add("favorito-item");

    const imagen = document.createElement("img");
    imagen.src = favorito.imagen.match(/src="([^"]+)"/)[1];

    const nombreContainer = document.createElement("div");
    nombreContainer.classList.add("nombre-container");
    const nombre = document.createElement("span");
    nombre.textContent = favorito.nombre;
    nombreContainer.appendChild(nombre);

    const tresPuntos = document.createElement("span");
    tresPuntos.classList.add("tres-puntos");
    tresPuntos.textContent = "...";
    tresPuntos.onclick = function (event) {
      event.preventDefault();
      mostrarVentanaOpciones(favorito.nombre, index);
    };

    contenedorFavorito.appendChild(imagen);
    contenedorFavorito.appendChild(nombreContainer);
    contenedorFavorito.appendChild(tresPuntos);

    favoritoEnlace.appendChild(contenedorFavorito);
    favoritoInfo.appendChild(favoritoEnlace);
  });
}


function mostrarVentanaOpciones(titulo, index) {
  // Obtener la ventana flotante
  const ventana = document.getElementById("ventanaOpciones");
  const overlay = document.getElementById("overlayOpciones");

  // Configurar el título en la ventana flotante
  ventana.querySelector(".ventana-titulo").textContent = titulo;

  // Mostrar overlay
  overlay.style.display = 'block'; // Activar el overlay

  // Agregar la clase 'show' para que se deslice hacia arriba
  ventana.classList.add("show");

  // Establecer la acción del botón Quitar
  ventana.querySelector(".btn-quitar").onclick = function () {
    eliminarFavorito(index);
  };
}

async function eliminarFavorito(index) {
  let favoritos = JSON.parse(localStorage.getItem("favoritos")) || [];
  const favorito = favoritos[index];

  // Eliminar localmente primero
  favoritos.splice(index, 1);
  localStorage.setItem("favoritos", JSON.stringify(favoritos));
  mostrarFavoritos(); // refrescar ya mismo
  cerrarVentanaOpciones();

  // Ahora sí, sincronizar con Supabase (en background)
  const { data: { session }, error } = await supabase.auth.getSession();
  const userId = session?.user?.id;

  if (userId && favorito) {
    await supabase.from("favoritos")
      .delete()
      .eq("id", userId)
      .eq("identificador", favorito.identificador);
  }
}






function cerrarVentanaOpciones() {
  const ventana = document.getElementById("ventanaOpciones");
  const overlay = document.getElementById("overlayOpciones");

  ventana.classList.remove("show"); // Quitar la clase para ocultar la ventana flotante
  overlay.style.display = 'none'; // Ocultar el overlay
}

function updateProfileImage(src) {
  if (!src) return;

  const ids = [
    "footerIconImg",
    "profileImage",
    "profilePageImage",
    "headerProfileIcon",
    "editableProfile",
    "editableProfileInModal"
  ];

  ids.forEach(id => {
    const el = document.getElementById(id);
    if (el && el.tagName === "IMG") {
      el.src = src;
    }
  });

  // Ocultar iconos por defecto si existen
  const defaultIcon = document.getElementById("defaultProfileIcon");
  if (defaultIcon) defaultIcon.style.display = "none";

  const defaultIconAlt = document.getElementById("defaultProfileIconAlt");
  if (defaultIconAlt) defaultIconAlt.style.display = "none";

  // Guardar imagen
  localStorage.setItem("profileImage", src);
}

// Restaurar al cargar página
document.addEventListener("DOMContentLoaded", () => {
  const savedProfileImage = localStorage.getItem("profileImage");
  if (savedProfileImage) {
    updateProfileImage(savedProfileImage);
  }
});

function updateProfileImage(imageUrl) {

// Ocultar/mostrar footer al hacer scroll
let lastScrollTop = 0;
const footer = document.querySelector(".footer");
const favoritoInfo = document.getElementById("favoritoInfo");

if (favoritoInfo && footer) {
  favoritoInfo.addEventListener("scroll", function () {
    const currentScroll = favoritoInfo.scrollTop;

    if (currentScroll > lastScrollTop) {
      // Bajando → ocultar footer
      footer.classList.add("hidden");
    } else {
      // Subiendo → mostrar footer
      footer.classList.remove("hidden");
    }

    lastScrollTop = currentScroll <= 0 ? 0 : currentScroll; // evitar negativos
  });
}
