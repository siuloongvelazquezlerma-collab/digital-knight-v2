<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reproductor</title>
  <link href="https://vjs.zencdn.net/8.5.2/video-js.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <style>
    /* Tus estilos personalizados completos aquí */
    body, html {
      margin: 0;
      padding: 0;
      background: black;
      height: 100%;
      overflow: hidden;
    }

   

       /* --- PLAYER --- */
  
       .video-js .vjs-control-bar,
  .video-js .vjs-big-play-button,
  .video-js .vjs-loading-spinner,
  .video-js .vjs-error-display {
    display: none !important;
  }
  
  
  .player {
    display: none; /* ⬅️ Esto es clave */
    position: relative;
    width: 100%;
    height: 100vh;
    justify-content: center;
    align-items: center;
    background: black;
  }
  
  video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: black;
  }
  
  .video-js {
    width: 100% !important;
    height: 100% !important;
    background-color: black !important;
  }
  
  .video-js video {
    width: 100% !important;
    height: 100% !important;
    object-fit: contain;
    background-color: black;
  }
  
      .overlay {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.4);
        opacity: 0;
        transition: opacity 0.4s;
        pointer-events: none;
      }
  
      .overlay.visible {
        opacity: 1;
      }
  
      .controls {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        opacity: 1;
        transition: opacity 0.5s;
        pointer-events: none;
      }
  
      .controls.hidden {
        opacity: 0;
        pointer-events: none;
      }
  
      .top-bar, .bottom-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px;
        pointer-events: auto;
      }
  
      .top-bar {
        position: absolute;
        top: 0; width: 100%;
      }
  
      .bottom-bar {
        position: absolute;
        bottom: 0; width: 100%;
        flex-direction: column;
        align-items: flex-start;
      }
  
      #episodeHeader .title {
    font-size: 1.2rem;
    font-weight: bold;
    margin-bottom: 2px;
  }
  
  #episodeHeader .subtitle {
    font-size: 1rem;
    opacity: 0.85;
  }
  
      .center-controls {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 40px;
        pointer-events: auto;
      }
  
      .btn {
        background: none;
        border: none;
        color: white;
        font-size: 2.5em;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }
  
      .btn .material-icons {
        font-size: 55px;
      }
  
      .progress-container {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 10px;
        margin-bottom: 20px;
      }
  
      .progress {
        flex: 1;
        appearance: none;
        height: 5px;
        background: #666;
        border-radius: 3px;
        cursor: pointer;
        outline: none;
      }
  
      .progress::-webkit-slider-thumb {
        appearance: none;
        height: 15px;
        width: 15px;
        border-radius: 50%;
        background: rgb(255, 255, 255);
        border: none;
      }
  
      .time {
        font-size: 0.9em;
        color: #ccc;
        white-space: nowrap;
      }
  
      .icon-btn {
        font-size: 28px;
        cursor: pointer;
      }
  
      .extra-controls {
    display: flex;
    justify-content: center;
    gap: 300px;
    width: 100%;
    pointer-events: auto;
    margin-bottom: 10px;
  }
  
  .extra-controls .btn {
    flex-direction: row;
    gap: 8px;
    font-size: 19px; /* Antes era 1.2em */
  }
  
  .extra-controls .btn .material-icons {
    font-size: 20px;
  }
  
  .extra-controls .btn .label {
    font-size: 13px; /* Antes era 1em */
    color: white;
  }

    .video-loader {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .spinner {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: conic-gradient(
      from 90deg,
          #0066ff21 0%,
          #0066ff 60%,
          #ffffff 80%,
          #afafaf00 30%
    );
    mask: radial-gradient(farthest-side, transparent calc(100% - 8px), black);
    -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 8px), black);
    animation: spin 1.2s linear infinite, shine 2s ease-in-out infinite;
    opacity: 1 !important;
    transition: opacity 3s ease-out;
  }
  
  /* Oculto */
  .hidden {
    display: none !important;
  }
  
  /* Animación de rotación */
  @keyframes spin {
    0% {
      transform: rotate(0deg);
    }
    100% {
      transform: rotate(360deg);
    }
  }
  
  
  /* Animación de brillo */
  @keyframes shine {
    0%, 100% {
      filter: brightness(1);
    }
    50% {
      filter: brightness(1.8);
    }
  }

    /* Incluye tus animaciones, estilos para los botones, etc. aquí */
  </style>
</head>

 <div class="video-loader hidden" id="videoLoader">

    </div>

player.addEventListener('mousemove', showControls);
player.addEventListener('click', showControls);

function enterFullscreen() {
  if (player.requestFullscreen) {
    player.requestFullscreen();
  } else if (player.webkitRequestFullscreen) {
    player.webkitRequestFullscreen();
  } else if (player.msRequestFullscreen) {
    player.msRequestFullscreen();
  }
}

function exitFullscreen() {
  if (document.exitFullscreen) {
    document.exitFullscreen();
  } else if (document.webkitExitFullscreen) {
    document.webkitExitFullscreen();
  } else if (document.msExitFullscreen) {
    document.msExitFullscreen();
  }
}

document.addEventListener('fullscreenchange', () => {
  const isFullscreen = document.fullscreenElement;

  if (!isFullscreen) {
    // 🔄 Volver a orientación vertical
    if (screen.orientation && screen.orientation.unlock) {
      screen.orientation.unlock(); // Algunos navegadores soportan esto
    } else if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('portrait').catch((err) => {
        console.warn('No se pudo volver a portrait:', err);
      });
    }

    if (!video.paused) {
      video.pause();
    }
    playPauseBtn.textContent = 'play_arrow';
    player.style.display = 'none';
    cover.style.display = 'flex';
  }
});


let hasStarted = false;
let reiniciaTimer = null;

const aspectModes = ['cover', 'fill', 'contain', 'fit-height', 'fit-width', 'scale-down'];
let currentAspectIndex = 0;

function toggleAspectRatio() {
  currentAspectIndex = (currentAspectIndex + 1) % aspectModes.length;
  const mode = aspectModes[currentAspectIndex];

  // Aplica el modo al video
  video.style.objectFit = mode.includes('fit-') ? 'contain' : mode;

  // Controla altura y ancho según modo
  switch (mode) {
    case 'fit-height':
      video.style.width = 'auto';
      video.style.height = '100%';
      break;
    case 'fit-width':
      video.style.width = '100%';
      video.style.height = 'auto';
      break;
    default:
      video.style.width = '100%';
      video.style.height = '100%';
      break;
  }

  // Muestra etiqueta en pantalla
  const label = document.getElementById('aspectLabel');
  label.textContent = mode;
  label.style.display = 'block';

  clearTimeout(label._hideTimeout);
  label._hideTimeout = setTimeout(() => {
    label.style.display = 'none';
  }, 1500);
}

  const appLink = "wvc-x-callback://open?url=" + encodeURIComponent(currentSrc);
  const storeLink = "https://play.google.com/store/apps/details?id=com.instantbits.cast.webvideo";

  const transmitLink = document.createElement('a');
  transmitLink.href = appLink;
  transmitLink.style.display = 'none';
  document.body.appendChild(transmitLink);

  let appOpened = false;
  transmitLink.click();

  setTimeout(() => {
    if (!appOpened) {
      window.location.href = storeLink;
    }
    document.body.removeChild(transmitLink);
  }, 1000);

  window.addEventListener("blur", () => {
    appOpened = true;
  }, { once: true });
}
